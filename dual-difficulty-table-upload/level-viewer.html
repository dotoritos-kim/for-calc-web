<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>10Key Revive Pack Level Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, Pretendard, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
        background: #f6f7f9;
        color: #20242a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.2;
      }

      .sub {
        margin: 0;
        color: #5f6875;
        font-size: 14px;
      }

      .tools {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .discord-link,
      .admin-link,
      button {
        min-height: 36px;
        border: 1px solid #cbd2dc;
        border-radius: 6px;
        background: #fff;
        color: #20242a;
        padding: 8px 12px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .discord-link:hover,
      .admin-link:hover,
      button:hover {
        border-color: #7f8da0;
      }

      .discord-link,
      .admin-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
      }

      .discord-link {
        min-height: 42px;
        padding: 10px 16px;
        font-size: 16px;
        font-weight: 700;
      }

      .admin-link {
        min-height: 42px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .view-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 12px;
        margin-bottom: 16px;
      }

      .control-group {
        display: grid;
        gap: 6px;
      }

      .control-label {
        color: #667181;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .segmented {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .segmented button.active {
        border-color: #1b6bff;
        background: #edf4ff;
        color: #0a4dcc;
        font-weight: 700;
      }

      .segmented button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .stat {
        border: 1px solid #d7dde5;
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .stat-label {
        color: #667181;
        font-size: 12px;
      }

      .stat-value {
        margin-top: 4px;
        font-size: 22px;
        font-weight: 700;
      }

      .levels {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }

      .level-button {
        position: relative;
        min-height: 52px;
        padding: 7px 8px;
        text-align: left;
      }

      .level-button.active {
        border-color: #1b6bff;
        background: #edf4ff;
        color: #0a4dcc;
      }

      .level {
        display: block;
        font-size: 18px;
        font-weight: 800;
      }

      .count {
        display: block;
        margin-top: 1px;
        color: #667181;
        font-size: 12px;
      }

      .panel {
        border: 1px solid #d7dde5;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #e5e9ef;
      }

      .panel-title {
        margin: 0;
        font-size: 18px;
      }

      .search {
        width: min(360px, 100%);
        min-height: 36px;
        border: 1px solid #cbd2dc;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #edf0f4;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #fafbfc;
        color: #5f6875;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .col-level {
        width: 70px;
        font-weight: 800;
      }

      .col-metric {
        width: 98px;
        font-weight: 800;
      }

      .col-gauge {
        width: 112px;
        font-weight: 800;
      }

      .col-title {
        min-width: 220px;
        font-weight: 700;
      }

      .muted {
        color: #667181;
      }

      .metric {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 6px;
        background: #f2f5f8;
        padding: 3px 7px;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        font-weight: 800;
      }

      .metric.empty {
        color: #8a94a3;
        background: #f8f9fb;
      }

      .metric.gauge {
        color: #695000;
        background: #fff4c7;
      }

      .comment-stack {
        display: grid;
        gap: 4px;
      }

      .comment-row {
        display: flex;
        gap: 6px;
      }

      .source-tag {
        flex: 0 0 auto;
        min-width: 22px;
        color: #667181;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        font-weight: 800;
      }

      .obj-tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        background: #edf4ff;
        color: #0a4dcc;
        padding: 3px 8px;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        font-weight: 700;
      }

      .hash {
        max-width: 180px;
        color: #667181;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .empty,
      .error {
        padding: 20px;
        color: #667181;
      }

      .error {
        color: #a13b2b;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        header,
        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        .tools {
          justify-content: flex-start;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .levels {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border-bottom: 1px solid #e5e9ef;
          padding: 10px 12px;
        }

        td {
          border: 0;
          padding: 4px 0;
        }

        td::before {
          display: inline-block;
          min-width: 72px;
          color: #667181;
          font-size: 12px;
          font-weight: 700;
          content: attr(data-label);
        }

        .hash {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>10Key Revive Pack Level Viewer</h1>
          <p class="sub">Revive Lv, Circus Rating, 게이지 TOTAL 기준으로 현재 테이블 항목을 확인합니다.</p>
        </div>
        <div class="tools">
          <a class="discord-link" href="https://discord.gg/2vwNSa54X9" target="_blank" rel="noreferrer">10키 한국 디스코드</a>
        </div>
      </header>

      <section class="view-controls" aria-label="view controls">
        <div class="control-group">
          <div class="control-label">표시</div>
          <div class="segmented" role="group" aria-label="display mode">
            <button id="modeRevive" type="button" data-mode="revive">Revive Lv</button>
            <button id="modeCircus" type="button" data-mode="circus">Circus Rating</button>
            <button id="modeBoth" type="button" data-mode="both">Both</button>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">레벨 기준</div>
          <div class="segmented" role="group" aria-label="level basis">
            <button id="basisRevive" type="button" data-basis="revive">Revive</button>
            <button id="basisCircus" type="button" data-basis="circus">Circus</button>
          </div>
        </div>
      </section>

      <section class="summary" aria-label="summary">
        <div class="stat">
          <div class="stat-label">표시 가능</div>
          <div id="totalCount" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">선택 레벨</div>
          <div id="selectedLevel" class="stat-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">선택 항목</div>
          <div id="selectedCount" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">로드 상태</div>
          <div id="loadSource" class="stat-value">-</div>
        </div>
      </section>

      <nav id="levels" class="levels" aria-label="levels"></nav>

      <section class="panel">
        <div class="panel-head">
          <h2 id="panelTitle" class="panel-title">Level -</h2>
          <input id="searchInput" class="search" type="search" placeholder="title / artist / comment / obj 검색" />
        </div>
        <div id="tableWrap"></div>
      </section>
    </main>

    <script>
      const inDualPackage = location.pathname.includes("/dual-difficulty-table-upload/");
      const DATASET_CANDIDATES = inDualPackage
        ? {
            revive: ["revive/body.json", "body.json"],
            circus: ["circus/body.json"],
          }
        : {
            revive: ["body.json", "../dual-difficulty-table-upload/revive/body.json"],
            circus: ["../dual-difficulty-table-upload/circus/body.json", "circus/body.json"],
          };

      const state = {
        datasets: {
          revive: { rows: [], source: "", error: "" },
          circus: { rows: [], source: "", error: "" },
        },
        entries: [],
        selectedLevel: "16",
        displayMode: "both",
        levelBasis: "revive",
        query: "",
        loading: true,
      };

      const levelsEl = document.getElementById("levels");
      const totalCountEl = document.getElementById("totalCount");
      const selectedLevelEl = document.getElementById("selectedLevel");
      const selectedCountEl = document.getElementById("selectedCount");
      const loadSourceEl = document.getElementById("loadSource");
      const panelTitleEl = document.getElementById("panelTitle");
      const tableWrapEl = document.getElementById("tableWrap");
      const searchInputEl = document.getElementById("searchInput");
      const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));
      const basisButtons = Array.from(document.querySelectorAll("[data-basis]"));

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeSearchText(value) {
        return String(value ?? "")
          .normalize("NFKC")
          .toLowerCase()
          .replace(/\bobjecter\s*[:：]?\s*/g, "obj:")
          .replace(/\bobj\s*[:：]?\s*/g, "obj:")
          .replace(/[\t\r\n/\\,\[\](){}]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function extractObjecters(value) {
        const matches = String(value ?? "")
          .normalize("NFKC")
          .matchAll(/\bobj(?:ecter)?\s*[:：]?\s*([^\s,[\]()/]+)/gi);
        const found = [];
        for (const match of matches) {
          const objecter = String(match[1] ?? "").replace(/[.;:]+$/g, "");
          if (objecter && !found.includes(objecter)) {
            found.push(objecter);
          }
        }
        return found;
      }

      function formatGaugeTotal(value) {
        const raw = String(value ?? "").trim();
        if (!raw) return "";
        const number = Number(raw);
        if (!Number.isFinite(number)) return raw;
        return number.toFixed(2).replace(/\.?0+$/, "");
      }

      function extractGaugeTotal(value) {
        const match = String(value ?? "")
          .normalize("NFKC")
          .match(/(?:#?\b(?:TOTAL|GaugeTotal|gauge_total)\b|게이지\s*회복량)\s*[:：]?\s*([0-9]+(?:\.[0-9]+)?)/i);
        return match ? formatGaugeTotal(match[1]) : "";
      }

      function mergeUnique(values) {
        const merged = [];
        for (const value of values) {
          if (value && !merged.includes(value)) {
            merged.push(value);
          }
        }
        return merged;
      }

      function normalizeRows(rows, tableType) {
        if (!Array.isArray(rows)) {
          throw new Error("body.json root must be an array.");
        }

        return rows
          .filter((row) => row && typeof row === "object")
          .map((row) => {
            const comment = String(row.comment ?? row.name_diff ?? "");
            const gaugeTotal = formatGaugeTotal(row.gauge_total ?? row.gaugeTotal ?? row.TOTAL ?? "");
            const normalized = {
              tableType,
              level: String(row.level ?? ""),
              title: String(row.title ?? ""),
              artist: String(row.artist ?? ""),
              comment,
              gaugeTotal: gaugeTotal || extractGaugeTotal(comment),
              md5: String(row.md5 ?? ""),
              sha256: String(row.sha256 ?? ""),
              objecters: [],
            };
            normalized.objecters = extractObjecters(
              `${normalized.title} ${normalized.artist} ${normalized.comment}`,
            );
            return normalized;
          });
      }

      function rowKey(row) {
        return row.md5 || row.sha256 || normalizeSearchText(`${row.title} ${row.artist} ${row.comment}`);
      }

      function buildEntries() {
        const map = new Map();
        for (const tableType of ["revive", "circus"]) {
          for (const row of state.datasets[tableType].rows) {
            const key = rowKey(row);
            if (!map.has(key)) {
              map.set(key, { revive: null, circus: null });
            }
            map.get(key)[tableType] = row;
          }
        }

        state.entries = Array.from(map.values())
          .map((entry) => {
            const primary = entry.revive || entry.circus;
            const comments = [entry.revive?.comment, entry.circus?.comment].filter(Boolean);
            const objecters = mergeUnique([
              ...(entry.revive?.objecters ?? []),
              ...(entry.circus?.objecters ?? []),
            ]);
            const searchText = normalizeSearchText(
              [
                primary?.title,
                primary?.artist,
                entry.revive?.level,
                entry.circus?.level,
                entry.revive?.gaugeTotal,
                entry.circus?.gaugeTotal,
                entry.revive?.comment,
                entry.circus?.comment,
                entry.revive?.md5,
                entry.circus?.md5,
                entry.revive?.sha256,
                entry.circus?.sha256,
                ...objecters.flatMap((objecter) => [objecter, `obj:${objecter}`, `objecter ${objecter}`]),
              ].join(" "),
            );
            return { ...entry, primary, comments, objecters, searchText };
          })
          .sort((left, right) => {
            const leftLevel = Number(left.revive?.level ?? left.circus?.level ?? 0);
            const rightLevel = Number(right.revive?.level ?? right.circus?.level ?? 0);
            if (leftLevel !== rightLevel) return leftLevel - rightLevel;
            return `${left.primary?.title ?? ""} ${left.primary?.comment ?? ""}`.localeCompare(
              `${right.primary?.title ?? ""} ${right.primary?.comment ?? ""}`,
              "ko",
            );
          });
      }

      function hasDataset(tableType) {
        return state.datasets[tableType].rows.length > 0;
      }

      function currentBasis() {
        if (state.displayMode === "revive") return "revive";
        if (state.displayMode === "circus") return "circus";
        return state.levelBasis;
      }

      function entryAvailableForMode(entry) {
        if (state.displayMode === "both") {
          return Boolean(entry.revive || entry.circus);
        }
        return Boolean(entry[state.displayMode]);
      }

      function levelKey(row, basis) {
        if (!row) return "";
        if (basis === "revive") return row.level;
        const value = Number(row.level);
        if (!Number.isFinite(value)) return row.level;
        return String(Math.floor(value));
      }

      function levelLabel(basis, key) {
        if (key === "all") return "All";
        if (basis === "circus") return key === "15" ? "CR 15" : `CR ${key}.x`;
        return `Lv.${key}`;
      }

      function sortedLevelKeys(basis) {
        const keys = new Set();
        for (const entry of state.entries) {
          if (!entryAvailableForMode(entry)) continue;
          const key = levelKey(entry[basis], basis);
          if (key) keys.add(key);
        }
        return Array.from(keys).sort((left, right) => Number(left) - Number(right));
      }

      function countByLevel(basis) {
        const counts = new Map();
        for (const entry of state.entries) {
          if (!entryAvailableForMode(entry)) continue;
          const key = levelKey(entry[basis], basis);
          if (!key) continue;
          counts.set(key, (counts.get(key) ?? 0) + 1);
        }
        return counts;
      }

      function filteredEntries() {
        const basis = currentBasis();
        const terms = normalizeSearchText(state.query).split(" ").filter(Boolean);
        return state.entries.filter((entry) => {
          if (!entryAvailableForMode(entry)) return false;
          if (state.selectedLevel !== "all" && levelKey(entry[basis], basis) !== state.selectedLevel) {
            return false;
          }
          if (!terms.length) return true;
          return terms.every((term) => entry.searchText.includes(term));
        });
      }

      function availableEntryCount() {
        return state.entries.filter(entryAvailableForMode).length;
      }

      function ensureModeAndLevel() {
        if (state.loading) return;
        if (!hasDataset("circus") && state.displayMode !== "revive") {
          state.displayMode = "revive";
        }
        if (!hasDataset("circus") && state.levelBasis === "circus") {
          state.levelBasis = "revive";
        }
        const keys = sortedLevelKeys(currentBasis());
        if (state.selectedLevel !== "all" && !keys.includes(state.selectedLevel)) {
          state.selectedLevel = keys.includes("16") ? "16" : "all";
        }
      }

      function renderControls() {
        for (const button of modeButtons) {
          const mode = button.dataset.mode;
          const disabled = mode === "circus" && !hasDataset("circus");
          button.disabled = disabled;
          button.classList.toggle("active", mode === state.displayMode);
        }
        for (const button of basisButtons) {
          const basis = button.dataset.basis;
          const disabled = basis === "circus" && !hasDataset("circus");
          button.disabled = disabled || state.displayMode !== "both";
          button.classList.toggle("active", basis === currentBasis());
        }
      }

      function renderLevels() {
        const basis = currentBasis();
        const keys = sortedLevelKeys(basis);
        const counts = countByLevel(basis);
        levelsEl.innerHTML = "";

        const allButton = document.createElement("button");
        allButton.type = "button";
        allButton.className = `level-button${state.selectedLevel === "all" ? " active" : ""}`;
        allButton.innerHTML = `
          <span class="level">All</span>
          <span class="count">${availableEntryCount()} charts</span>
        `;
        allButton.addEventListener("click", () => {
          state.selectedLevel = "all";
          updateHash();
          render();
        });
        levelsEl.appendChild(allButton);

        for (const key of keys) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `level-button${key === state.selectedLevel ? " active" : ""}`;
          button.innerHTML = `
            <span class="level">${escapeHtml(levelLabel(basis, key))}</span>
            <span class="count">${counts.get(key) ?? 0} charts</span>
          `;
          button.addEventListener("click", () => {
            state.selectedLevel = key;
            updateHash();
            render();
          });
          levelsEl.appendChild(button);
        }
      }

      function metricCell(row, type) {
        if (!row) return '<span class="metric empty">-</span>';
        const text = type === "circus" ? `CR ${row.level}` : `Lv.${row.level}`;
        return `<span class="metric">${escapeHtml(text)}</span>`;
      }

      function gaugeTotalForEntry(entry) {
        return entry.revive?.gaugeTotal || entry.circus?.gaugeTotal || "";
      }

      function gaugeCell(entry) {
        const total = gaugeTotalForEntry(entry);
        return total
          ? `<span class="metric gauge">TOTAL ${escapeHtml(total)}</span>`
          : '<span class="metric empty">-</span>';
      }

      function commentCell(entry) {
        if (state.displayMode !== "both") {
          const row = entry[state.displayMode] || entry.primary;
          return escapeHtml(row?.comment ?? "");
        }
        const reviveComment = entry.revive?.comment ?? "";
        const circusComment = entry.circus?.comment ?? "";
        const rows = [];
        if (reviveComment) {
          rows.push(`<div class="comment-row"><span class="source-tag">R</span><span>${escapeHtml(reviveComment)}</span></div>`);
        }
        if (circusComment && circusComment !== reviveComment) {
          rows.push(`<div class="comment-row"><span class="source-tag">C</span><span>${escapeHtml(circusComment)}</span></div>`);
        }
        return rows.length ? `<div class="comment-stack">${rows.join("")}</div>` : "";
      }

      function renderTable(entries) {
        if (!state.entries.length) {
          tableWrapEl.innerHTML = '<div class="empty">body.json을 읽는 중입니다.</div>';
          return;
        }

        if (!entries.length) {
          tableWrapEl.innerHTML = '<div class="empty">선택한 조건에 해당하는 항목이 없습니다.</div>';
          return;
        }

        const metricHeaders =
          state.displayMode === "both"
            ? '<th class="col-metric">Revive</th><th class="col-metric">Circus</th>'
            : `<th class="col-level">${state.displayMode === "circus" ? "Circus" : "Level"}</th>`;

        tableWrapEl.innerHTML = `
          <table>
            <thead>
              <tr>
                ${metricHeaders}
                <th class="col-gauge">TOTAL</th>
                <th class="col-title">Title</th>
                <th>Artist</th>
                <th>Obj</th>
                <th>Comment</th>
                <th>MD5</th>
              </tr>
            </thead>
            <tbody>
              ${entries
                .map((entry) => {
                  const primary = entry[state.displayMode] || entry.primary;
                  const metricCells =
                    state.displayMode === "both"
                      ? `
                        <td class="col-metric" data-label="Revive">${metricCell(entry.revive, "revive")}</td>
                        <td class="col-metric" data-label="Circus">${metricCell(entry.circus, "circus")}</td>
                      `
                      : `<td class="col-level" data-label="Level">${metricCell(primary, state.displayMode)}</td>`;
                  return `
                    <tr>
                      ${metricCells}
                      <td class="col-gauge" data-label="TOTAL">${gaugeCell(entry)}</td>
                      <td class="col-title" data-label="Title">${escapeHtml(primary?.title ?? "")}</td>
                      <td data-label="Artist">${escapeHtml(primary?.artist ?? "")}</td>
                      <td data-label="Obj">${
                        entry.objecters.length
                          ? entry.objecters.map((objecter) => `<span class="obj-tag">obj:${escapeHtml(objecter)}</span>`).join(" ")
                          : '<span class="muted">-</span>'
                      }</td>
                      <td class="muted" data-label="Comment">${commentCell(entry)}</td>
                      <td class="hash" data-label="MD5">${escapeHtml(primary?.md5 ?? "")}</td>
                    </tr>
                  `;
                })
                .join("")}
            </tbody>
          </table>
        `;
      }

      function loadStatusText() {
        if (hasDataset("revive") && hasDataset("circus")) return "2 tables";
        if (hasDataset("revive")) return "Revive only";
        return "-";
      }

      function panelTitle() {
        const basis = currentBasis();
        const mode = state.displayMode === "both" ? "Both" : state.displayMode === "circus" ? "Circus Rating" : "Revive Lv";
        const level = levelLabel(basis, state.selectedLevel);
        return `${mode} / ${level}`;
      }

      function render() {
        ensureModeAndLevel();
        const entries = filteredEntries();
        totalCountEl.textContent = String(availableEntryCount());
        selectedLevelEl.textContent = levelLabel(currentBasis(), state.selectedLevel);
        selectedCountEl.textContent = String(entries.length);
        loadSourceEl.textContent = loadStatusText();
        panelTitleEl.textContent = panelTitle();
        renderControls();
        renderLevels();
        renderTable(entries);
      }

      async function fetchFirst(paths) {
        const errors = [];
        for (const path of paths) {
          try {
            const response = await fetch(path, { cache: "no-store" });
            if (!response.ok) {
              errors.push(`${path}: ${response.status}`);
              continue;
            }
            return { rows: await response.json(), source: path };
          } catch (error) {
            errors.push(`${path}: ${error.message}`);
          }
        }
        throw new Error(errors.join(" / "));
      }

      async function loadDataset(tableType) {
        const payload = await fetchFirst(DATASET_CANDIDATES[tableType]);
        state.datasets[tableType] = {
          rows: normalizeRows(payload.rows, tableType),
          source: payload.source,
          error: "",
        };
      }

      async function loadAll() {
        try {
          await loadDataset("revive");
          try {
            await loadDataset("circus");
          } catch (error) {
            state.datasets.circus = { rows: [], source: "", error: error.message };
          }
          buildEntries();
        } finally {
          state.loading = false;
        }
        render();
      }

      function updateHash() {
        const basis = currentBasis();
        history.replaceState(null, "", `#${basis}-${state.selectedLevel}`);
      }

      function applyHashLevel() {
        if (location.hash === "#level-all" || location.hash === "#revive-all" || location.hash === "#circus-all") {
          state.selectedLevel = "all";
          return;
        }
        const match = location.hash.match(/#(?:level|revive|circus)-(.+)$/);
        if (!match) return;
        const rawLevel = decodeURIComponent(match[1]);
        if (rawLevel) {
          state.selectedLevel = rawLevel;
        }
        if (location.hash.startsWith("#circus-")) {
          state.levelBasis = "circus";
        }
      }

      for (const button of modeButtons) {
        button.addEventListener("click", () => {
          if (button.disabled) return;
          state.displayMode = button.dataset.mode;
          if (state.displayMode !== "both") {
            state.levelBasis = state.displayMode;
          }
          state.selectedLevel = state.displayMode === "circus" ? "all" : state.selectedLevel;
          updateHash();
          render();
        });
      }

      for (const button of basisButtons) {
        button.addEventListener("click", () => {
          if (button.disabled) return;
          state.levelBasis = button.dataset.basis;
          state.selectedLevel = state.levelBasis === "circus" ? "all" : state.selectedLevel;
          updateHash();
          render();
        });
      }

      searchInputEl.addEventListener("input", () => {
        state.query = searchInputEl.value;
        render();
      });

      window.addEventListener("hashchange", () => {
        applyHashLevel();
        render();
      });

      applyHashLevel();
      render();
      loadAll().catch((error) => {
        tableWrapEl.innerHTML = `
          <div class="error">
            ${escapeHtml(error.message)}<br />
            서버에서 table/level-viewer.html 또는 dual-difficulty-table-upload/level-viewer.html로 열어 주세요.
          </div>
        `;
      });
    </script>
  </body>
</html>
