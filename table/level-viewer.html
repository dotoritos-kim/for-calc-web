<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10Key Revive Pack Level Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, Pretendard, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
        background: #f6f7f9;
        color: #20242a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.2;
      }

      .sub {
        margin: 0;
        color: #5f6875;
        font-size: 14px;
      }

      .tools {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .discord-link,
      button {
        min-height: 36px;
        border: 1px solid #cbd2dc;
        border-radius: 6px;
        background: #fff;
        color: #20242a;
        padding: 8px 12px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
      }

      .discord-link:hover,
      button:hover {
        border-color: #7f8da0;
      }

      .discord-link {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 10px 16px;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .stat {
        border: 1px solid #d7dde5;
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .stat-label {
        color: #667181;
        font-size: 12px;
      }

      .stat-value {
        margin-top: 4px;
        font-size: 22px;
        font-weight: 700;
      }

      .levels {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 16px;
      }

      .level-button {
        position: relative;
        min-height: 52px;
        padding: 7px 8px;
        text-align: left;
      }

      .level-button.active {
        border-color: #1b6bff;
        background: #edf4ff;
        color: #0a4dcc;
      }

      .level {
        display: block;
        font-size: 18px;
        font-weight: 800;
      }

      .count {
        display: block;
        margin-top: 1px;
        color: #667181;
        font-size: 12px;
      }

      .panel {
        border: 1px solid #d7dde5;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #e5e9ef;
      }

      .panel-title {
        margin: 0;
        font-size: 18px;
      }

      .search {
        width: min(360px, 100%);
        min-height: 36px;
        border: 1px solid #cbd2dc;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #edf0f4;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #fafbfc;
        color: #5f6875;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .col-level {
        width: 70px;
        font-weight: 800;
      }

      .col-title {
        min-width: 220px;
        font-weight: 700;
      }

      .muted {
        color: #667181;
      }

      .hash {
        max-width: 180px;
        color: #667181;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .empty,
      .error {
        padding: 20px;
        color: #667181;
      }

      .error {
        color: #a13b2b;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        header,
        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        .tools {
          justify-content: flex-start;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .levels {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border-bottom: 1px solid #e5e9ef;
          padding: 10px 12px;
        }

        td {
          border: 0;
          padding: 4px 0;
        }

        td::before {
          display: inline-block;
          min-width: 72px;
          color: #667181;
          font-size: 12px;
          font-weight: 700;
          content: attr(data-label);
        }

        .hash {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>10Key Revive Pack Level Viewer</h1>
          <p class="sub">1~19 레벨 버튼을 눌러 현재 body.json에 들어있는 곡을 확인합니다.</p>
        </div>
        <div class="tools">
          <a class="discord-link" href="https://discord.gg/2vwNSa54X9" target="_blank" rel="noreferrer">10키 한국 디스코드</a>
        </div>
      </header>

      <section class="summary" aria-label="summary">
        <div class="stat">
          <div class="stat-label">총 항목</div>
          <div id="totalCount" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">선택 레벨</div>
          <div id="selectedLevel" class="stat-value">-</div>
        </div>
        <div class="stat">
          <div class="stat-label">선택 항목</div>
          <div id="selectedCount" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">로드 방식</div>
          <div id="loadSource" class="stat-value">-</div>
        </div>
      </section>

      <nav id="levels" class="levels" aria-label="levels"></nav>

      <section class="panel">
        <div class="panel-head">
          <h2 id="panelTitle" class="panel-title">Level -</h2>
          <input id="searchInput" class="search" type="search" placeholder="title / artist / comment 검색" />
        </div>
        <div id="tableWrap"></div>
      </section>
    </main>

    <script>
      const state = {
        rows: [],
        selectedLevel: 18,
        source: "-",
        query: "",
      };

      const levelsEl = document.getElementById("levels");
      const totalCountEl = document.getElementById("totalCount");
      const selectedLevelEl = document.getElementById("selectedLevel");
      const selectedCountEl = document.getElementById("selectedCount");
      const loadSourceEl = document.getElementById("loadSource");
      const panelTitleEl = document.getElementById("panelTitle");
      const tableWrapEl = document.getElementById("tableWrap");
      const searchInputEl = document.getElementById("searchInput");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function normalizeRows(rows) {
        if (!Array.isArray(rows)) {
          throw new Error("body.json root must be an array.");
        }

        return rows
          .filter((row) => row && typeof row === "object")
          .map((row) => ({
            level: String(row.level ?? ""),
            title: String(row.title ?? ""),
            artist: String(row.artist ?? ""),
            comment: String(row.comment ?? row.name_diff ?? ""),
            md5: String(row.md5 ?? ""),
            sha256: String(row.sha256 ?? ""),
          }))
          .sort((a, b) => {
            const levelDiff = Number(a.level) - Number(b.level);
            if (levelDiff) return levelDiff;
            return `${a.title} ${a.comment}`.localeCompare(`${b.title} ${b.comment}`, "ko");
          });
      }

      function countByLevel() {
        const counts = new Map();
        for (const row of state.rows) {
          counts.set(row.level, (counts.get(row.level) ?? 0) + 1);
        }
        return counts;
      }

      function filteredRows() {
        const needle = state.query.trim().toLowerCase();
        return state.rows.filter((row) => {
          if (row.level !== String(state.selectedLevel)) return false;
          if (!needle) return true;
          return `${row.title} ${row.artist} ${row.comment} ${row.md5} ${row.sha256}`
            .toLowerCase()
            .includes(needle);
        });
      }

      function renderLevels() {
        const counts = countByLevel();
        levelsEl.innerHTML = "";
        for (let level = 1; level <= 19; level += 1) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `level-button${level === state.selectedLevel ? " active" : ""}`;
          button.innerHTML = `
            <span class="level">Lv.${level}</span>
            <span class="count">${counts.get(String(level)) ?? 0} charts</span>
          `;
          button.addEventListener("click", () => {
            state.selectedLevel = level;
            location.hash = `level-${level}`;
            render();
          });
          levelsEl.appendChild(button);
        }
      }

      function renderTable(rows) {
        if (!state.rows.length) {
          tableWrapEl.innerHTML = '<div class="empty">body.json을 읽는 중입니다.</div>';
          return;
        }

        if (!rows.length) {
          tableWrapEl.innerHTML = '<div class="empty">선택한 조건에 해당하는 항목이 없습니다.</div>';
          return;
        }

        tableWrapEl.innerHTML = `
          <table>
            <thead>
              <tr>
                <th class="col-level">Level</th>
                <th class="col-title">Title</th>
                <th>Artist</th>
                <th>Comment</th>
                <th>MD5</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td class="col-level" data-label="Level">Lv.${escapeHtml(row.level)}</td>
                      <td class="col-title" data-label="Title">${escapeHtml(row.title)}</td>
                      <td data-label="Artist">${escapeHtml(row.artist)}</td>
                      <td class="muted" data-label="Comment">${escapeHtml(row.comment)}</td>
                      <td class="hash" data-label="MD5">${escapeHtml(row.md5)}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function render() {
        const rows = filteredRows();
        totalCountEl.textContent = String(state.rows.length);
        selectedLevelEl.textContent = `Lv.${state.selectedLevel}`;
        selectedCountEl.textContent = String(rows.length);
        loadSourceEl.textContent = state.source;
        panelTitleEl.textContent = `Level ${state.selectedLevel}`;
        renderLevels();
        renderTable(rows);
      }

      async function loadFromFetch() {
        const response = await fetch("body.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`body.json fetch failed: ${response.status}`);
        }
        const rows = await response.json();
        state.rows = normalizeRows(rows);
        state.source = "fetch";
        render();
      }

      function applyHashLevel() {
        const match = location.hash.match(/level-(\d+)/);
        if (!match) return;
        const level = Number(match[1]);
        if (Number.isInteger(level) && level >= 1 && level <= 19) {
          state.selectedLevel = level;
        }
      }

      searchInputEl.addEventListener("input", () => {
        state.query = searchInputEl.value;
        render();
      });

      window.addEventListener("hashchange", () => {
        applyHashLevel();
        render();
      });

      applyHashLevel();
      render();
      loadFromFetch().catch((error) => {
        tableWrapEl.innerHTML = `
          <div class="error">
            ${escapeHtml(error.message)}<br />
            서버에서 table/level-viewer.html로 열어 주세요.
          </div>
        `;
      });
    </script>
  </body>
</html>
