services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TABLE_ADMIN_TOKEN: ${TABLE_ADMIN_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
