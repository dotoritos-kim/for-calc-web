services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DISCORD_ADMIN_CHANNEL_ID: ${DISCORD_ADMIN_CHANNEL_ID:-}
      DISCORD_ADMIN_USER_IDS: ${DISCORD_ADMIN_USER_IDS:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_APPROVAL_WEBHOOK_URL: ${DISCORD_APPROVAL_WEBHOOK_URL:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_DAN_ROLE_IDS: ${DISCORD_DAN_ROLE_IDS:-}
      DISCORD_GATEWAY_ENABLED: ${DISCORD_GATEWAY_ENABLED:-1}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_REGISTER_COMMANDS: ${DISCORD_REGISTER_COMMANDS:-1}
      DISCORD_UPLOAD_DB: ${DISCORD_UPLOAD_DB:-/app/for-calc-web/.discord_uploads.json}
      DISCORD_UPLOAD_MAX_BYTES: ${DISCORD_UPLOAD_MAX_BYTES:-25165824}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      TABLE_ADMIN_AUDIT_LOG: ${TABLE_ADMIN_AUDIT_LOG:-/app/for-calc-web/.admin_audit.jsonl}
      TABLE_ADMIN_AUTH_DB: ${TABLE_ADMIN_AUTH_DB:-/app/for-calc-web/.admin_auth.json}
      TABLE_ADMIN_TOKEN: ${TABLE_ADMIN_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
